name: 'Ledit Agent'
description: 'Automatically solve GitHub issues using AI-powered code generation with ledit'
author: 'Alan Price'

branding:
  icon: 'code'
  color: 'blue'

inputs:
  # Mode Selection
  mode:
    description: 'Operation mode: solve (default) or review'
    required: false
    default: 'solve'
  
  github-token:
    description: 'GitHub token for API access'
    required: true
  
  # AI Provider Configuration
  ai-provider:
    description: 'Primary AI provider to use for the main agent step (openai, openrouter, zai, deepinfra, chutes, mistral, or a custom provider name set via custom-provider-name)'
    required: true
  
  ai-model:
    description: 'Model to use with the primary provider (e.g., deepseek-ai/DeepSeek-V3, GLM-4.6, openai/gpt-4o)'
    required: true

  # Provider API keys — set whichever providers you use.
  # Ledit reads these as standard env vars so multiple providers can be active
  # in the same run (e.g. one for coding, another for multimodal vision work).
  openai-api-key:
    description: 'OpenAI API key (OPENAI_API_KEY)'
    required: false
  openrouter-api-key:
    description: 'OpenRouter API key (OPENROUTER_API_KEY)'
    required: false
  deepinfra-api-key:
    description: 'DeepInfra API key (DEEPINFRA_API_KEY)'
    required: false
  zai-api-key:
    description: 'Z.AI API key (ZAI_API_KEY)'
    required: false
  chutes-api-key:
    description: 'Chutes API key (CHUTES_API_KEY)'
    required: false
  mistral-api-key:
    description: 'Mistral API key (MISTRAL_API_KEY)'
    required: false
  jina-api-key:
    description: 'Jina AI API key for web search and URL fetching — free at jina.ai (JINA_API_KEY). Enables the orchestrator and code_reviewer personas to validate libraries and docs.'
    required: false

  # Custom provider — for any OpenAI-compatible endpoint not listed above
  custom-provider-name:
    description: 'Identifier for the custom provider. Set ai-provider to this value to use it.'
    required: false
    default: 'custom'
  custom-provider-url:
    description: 'Base endpoint URL for the custom provider (e.g. https://api.example.com/v1)'
    required: false
  custom-provider-model:
    description: 'Default model name for the custom provider (defaults to ai-model if not set)'
    required: false
  custom-provider-api-key:
    description: 'API key for the custom provider'
    required: false

  # Subagent provider overrides
  subagent-coder-provider:
    description: 'Provider to use for the coder subagent (e.g. a custom provider name). Defaults to ai-provider.'
    required: false
  subagent-coder-model:
    description: 'Model to use for the coder subagent. Defaults to ai-model.'
    required: false

  
  # Review Mode Configuration
  review-type:
    description: 'Type of review: comprehensive, security, performance, style'
    required: false
    default: 'comprehensive'
  
  comment-threshold:
    description: 'When to post inline comments: low, medium, high'
    required: false
    default: 'medium'
  
  summary-only:
    description: 'Only post summary without inline comments'
    required: false
    default: 'false'
  
  # Ledit Configuration
  ledit-version:
    description: 'Ledit version to install (e.g., v1.0.0, latest)'
    required: false
    default: 'latest'
  
  timeout-minutes:
    description: 'Timeout for the ledit agent in minutes. Both solve and review run a 2-step workflow (implement/review + verify/audit), so values of 20+ are recommended.'
    required: false
    default: '20'
  
  # MCP Configuration
  enable-mcp:
    description: 'Enable MCP GitHub integration for PR interactions'
    required: false
    default: 'true'
  
  mcp-github-token:
    description: 'GitHub token for MCP (defaults to github-token if not specified)'
    required: false
  
  # Advanced Configuration
  max-iterations:
    description: 'Maximum iterations for the ledit agent'
    required: false
    default: '180'
  
  debug:
    description: 'Enable debug logging'
    required: false
    default: 'false'
  
  workspace-dir:
    description: 'Working directory for ledit'
    required: false
    default: '.'
  
  # Auto-review configuration
  auto-review:
    description: 'Automatically add /ledit-review comment to PR after solving issue'
    required: false
    default: 'false'

outputs:
  success:
    description: 'Whether the issue was successfully processed'
    value: ${{ steps.main.outputs.success }}
  
  pr-number:
    description: 'Pull request number if created'
    value: ${{ steps.main.outputs.pr-number }}
  
  pr-url:
    description: 'Pull request URL if created'
    value: ${{ steps.main.outputs.pr-url }}
  
  branch-name:
    description: 'Branch name created/updated'
    value: ${{ steps.main.outputs.branch-name }}
  
  commit-sha:
    description: 'Latest commit SHA'
    value: ${{ steps.main.outputs.commit-sha }}

runs:
  using: 'composite'
  steps:
    - name: Setup environment
      shell: bash
      run: |
        echo "LEDIT_ACTION_PATH=${{ github.action_path }}" >> $GITHUB_ENV
        echo "LEDIT_WORKSPACE=${{ inputs.workspace-dir }}" >> $GITHUB_ENV
        echo "LEDIT_TIMEOUT_MINUTES=${{ inputs.timeout-minutes }}" >> $GITHUB_ENV
        echo "LEDIT_DEBUG=${{ inputs.debug }}" >> $GITHUB_ENV
    
    - name: Install dependencies
      shell: bash
      run: |
        # Install Go if not present
        if ! command -v go &> /dev/null; then
          echo "Installing Go..."
          curl -sL https://go.dev/dl/go1.21.5.linux-amd64.tar.gz | sudo tar -C /usr/local -xzf -
          echo 'export PATH=$PATH:/usr/local/go/bin' >> $GITHUB_ENV
          echo 'export PATH=$PATH:$HOME/go/bin' >> $GITHUB_ENV
          export PATH=$PATH:/usr/local/go/bin:$HOME/go/bin
        fi
        
        # Install jq for JSON parsing
        sudo apt-get update && sudo apt-get install -y jq
    
    - name: Install ledit
      shell: bash
      run: |
        ${{ github.action_path }}/scripts/install-ledit.sh "${{ inputs.ledit-version }}"
    
    - name: Configure ledit
      shell: bash
      env:
        AI_PROVIDER: ${{ inputs.ai-provider }}
        AI_MODEL: ${{ inputs.ai-model }}
        MAX_ITERATIONS: ${{ inputs.max-iterations }}
        OPENAI_API_KEY: ${{ inputs.openai-api-key }}
        OPENROUTER_API_KEY: ${{ inputs.openrouter-api-key }}
        DEEPINFRA_API_KEY: ${{ inputs.deepinfra-api-key }}
        ZAI_API_KEY: ${{ inputs.zai-api-key }}
        CHUTES_API_KEY: ${{ inputs.chutes-api-key }}
        MISTRAL_API_KEY: ${{ inputs.mistral-api-key }}
        JINA_API_KEY: ${{ inputs.jina-api-key }}
        CUSTOM_PROVIDER_NAME: ${{ inputs.custom-provider-name }}
        CUSTOM_PROVIDER_URL: ${{ inputs.custom-provider-url }}
        CUSTOM_PROVIDER_MODEL: ${{ inputs.custom-provider-model }}
        CUSTOM_PROVIDER_API_KEY: ${{ inputs.custom-provider-api-key }}
        SUBAGENT_CODER_PROVIDER: ${{ inputs.subagent-coder-provider }}
        SUBAGENT_CODER_MODEL: ${{ inputs.subagent-coder-model }}
      run: |
        ${{ github.action_path }}/scripts/configure-ledit.sh
    
    - name: Configure MCP
      if: inputs.enable-mcp == 'true'
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.mcp-github-token || inputs.github-token }}
        GITHUB_REPOSITORY: ${{ github.repository }}
      run: |
        ${{ github.action_path }}/scripts/configure-mcp.sh
    
    - name: Run workflow based on mode
      id: main
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
        LEDIT_TIMEOUT_MINUTES: ${{ inputs.timeout-minutes }}
        LEDIT_DEBUG: ${{ inputs.debug }}
        AI_PROVIDER: ${{ inputs.ai-provider }}
        AI_MODEL: ${{ inputs.ai-model }}
        ENABLE_MCP: ${{ inputs.enable-mcp }}
        MAX_ITERATIONS: ${{ inputs.max-iterations }}
        REVIEW_TYPE: ${{ inputs.review-type }}
        COMMENT_THRESHOLD: ${{ inputs.comment-threshold }}
        SUMMARY_ONLY: ${{ inputs.summary-only }}
        AUTO_REVIEW: ${{ inputs.auto-review }}
        OPENAI_API_KEY: ${{ inputs.openai-api-key }}
        OPENROUTER_API_KEY: ${{ inputs.openrouter-api-key }}
        DEEPINFRA_API_KEY: ${{ inputs.deepinfra-api-key }}
        ZAI_API_KEY: ${{ inputs.zai-api-key }}
        CHUTES_API_KEY: ${{ inputs.chutes-api-key }}
        MISTRAL_API_KEY: ${{ inputs.mistral-api-key }}
        JINA_API_KEY: ${{ inputs.jina-api-key }}
        CUSTOM_PROVIDER_NAME: ${{ inputs.custom-provider-name }}
        CUSTOM_PROVIDER_URL: ${{ inputs.custom-provider-url }}
        CUSTOM_PROVIDER_MODEL: ${{ inputs.custom-provider-model }}
        CUSTOM_PROVIDER_API_KEY: ${{ inputs.custom-provider-api-key }}
        SUBAGENT_CODER_PROVIDER: ${{ inputs.subagent-coder-provider }}
        SUBAGENT_CODER_MODEL: ${{ inputs.subagent-coder-model }}
      run: |
        if [ "${{ inputs.mode }}" == "review" ]; then
          ${{ github.action_path }}/scripts/review-pr.sh
        else
          ${{ github.action_path }}/scripts/main.sh
        fi